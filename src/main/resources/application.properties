spring.application.name=course_management

#Changing port
server.port=8099

spring.datasource.url=jdbc:mysql://localhost:3306/lpu_db
spring.datasource.username=root
spring.datasource.password=titan*9
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



#HIBERNATE Configuration
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#ACTUATORS (Metrics & Status)
# Expose all actuator endpoints (health, info, metrics, mappings, etc.)
management.endpoints.web.exposure.include=*
# Show detailed health information (e.g., database connection status)
management.endpoint.health.show-details=always


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Change the Swagger UI path (e.g., http://localhost:8080/api-docs.html)
#springdoc.swagger-ui.path=/api-docs.html
# Change the raw JSON path
#springdoc.api-docs.path=/api-spec



# Set a custom default user for development
spring.security.user.name=admin
spring.security.user.password=password123


# Override the hibernate.ddl-auto default 'none' to 'validate'
spring.jpa.hibernate.ddl-auto=validate
# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# Optional: ensure it runs on startup
spring.liquibase.enabled=true
# Activate both 'default' and 'dev' changesets
#spring.liquibase.contexts=dev