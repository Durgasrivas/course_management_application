spring.application.name=course_management

#Changing port
server.port=8099

spring.datasource.url=jdbc:mysql://localhost:3306/trumio_db
spring.datasource.username=root
spring.datasource.password=titan*9
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



#HIBERNATE Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#ACTUATORS (Metrics & Status)
# Expose all actuator endpoints (health, info, metrics, mappings, etc.)
management.endpoints.web.exposure.include=*
# Show detailed health information (e.g., database connection status)
management.endpoint.health.show-details=always